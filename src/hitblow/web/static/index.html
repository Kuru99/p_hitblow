<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hit & Blow - 通信対戦</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex; justify-content: center; align-items: center; padding: 10px;
    }
    .container {
      background: white; border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px; width: 100%; padding: 40px; position: relative;
    }
    h1 {
      text-align: center; color: #333; margin-bottom: 20px; font-size: 2em;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; font-size: 0.9em; font-weight: bold;
    }
    .connection-status {
      padding: 8px 12px; border-radius: 20px; background: #fff3cd; color: #856404;
    }
    .connection-status.connected { background: #d4edda; color: #155724; }
    .server-status {
      padding: 8px 12px; border-radius: 20px; background: #e2e3e5; color: #383d41;
    }
    
    .screen { display: none; }
    .screen.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Home Screen */
    .action-panel { background: #f8f9fa; border: 2px solid #eee; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .action-panel h3 { margin-bottom: 15px; color: #444; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
    .form-group select, .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
    .btn {
      width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1em;
      cursor: pointer; transition: all 0.2s; color: white;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-create { background: linear-gradient(135deg, #4caf50, #8bc34a); }
    .btn-join { background: linear-gradient(135deg, #2196f3, #03a9f4); }
    .btn-ready { background: linear-gradient(135deg, #ff9800, #ffc107); margin-top: 20px; }
    .btn-ready.is-ready { background: #4caf50; }
    .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

    /* Room Screen */
    .room-info { text-align: center; margin-bottom: 30px; }
    .room-id-display { font-size: 3em; font-weight: bold; letter-spacing: 5px; color: #764ba2; margin: 10px 0; }
    .player-list { display: flex; gap: 20px; margin-bottom: 20px; }
    .player-card { flex: 1; padding: 20px; border-radius: 12px; border: 2px solid #eee; text-align: center; }
    .player-card.ready { border-color: #4caf50; background: #e8f5e9; }
    
    /* Game Screen */
    .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #eee; }
    .player-info { flex: 1; text-align: center; padding: 10px; border-radius: 8px; transition: all 0.3s; }
    .player-info.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; font-weight: bold; box-shadow: 0 4px 10px rgba(102,126,234,0.3); }
    .turns-display { flex: 1; text-align: center; font-size: 0.9em; color: #666; }
    .life-gauge { display: flex; gap: 5px; margin-top: 5px; justify-content: center; }
    .life-heart { width: 16px; height: 16px; background: #ff6b6b; border-radius: 50%; }
    .life-heart.empty { background: #ddd; }
    
    .history-section { background: #f5f5f5; border-radius: 10px; padding: 15px; margin-bottom: 20px; height: 200px; overflow-y: auto; }
    .history-item { background: white; padding: 10px; margin-bottom: 8px; border-radius: 6px; font-size: 0.95em; border-left: 4px solid #ddd; }
    .history-item.player0 { border-left-color: #2196f3; }
    .history-item.player1 { border-left-color: #ff6f00; }
    .guess-value { font-weight: bold; font-family: monospace; font-size: 1.2em; margin: 5px 0; letter-spacing: 2px; }
    .badge { padding: 3px 10px; border-radius: 4px; font-size: 0.85em; font-weight: bold; color: white; margin-right: 5px;}
    .badge-hit { background: linear-gradient(135deg, #4caf50, #8bc34a); }
    .badge-blow { background: linear-gradient(135deg, #ffc107, #ff9800); }

    /* Input UI */
    .input-boxes { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
    .input-box { width: 50px; height: 50px; border: 3px solid #ddd; border-radius: 10px; font-size: 1.5em; font-weight: bold; text-align: center; line-height: 44px; background: #f9f9f9; }
    .input-box.active { border-color: #667eea; background: #f0f4ff; }
    .input-box.filled { border-color: #667eea; color: #667eea; }
    
    .button-pad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 15px; }
    .num-btn { padding: 12px 0; border: 2px solid #ddd; border-radius: 8px; background: white; font-weight: bold; font-size: 1.1em; cursor: pointer; }
    .num-btn:hover:not(:disabled) { background: #667eea; color: white; border-color: #667eea; }
    .num-btn:disabled { background: #e0e0e0; color: #999; cursor: not-allowed; opacity: 0.5; }
    
    .control-buttons { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .control-btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; }
    .control-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-back { background: #ff9800; }
    .btn-clear { background: #f44336; }
    .btn-enter { background: #4caf50; }

    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
    .modal.active { display: flex; animation: fadeIn 0.3s; }
    .modal-content { background: white; border-radius: 20px; padding: 40px; text-align: center; max-width: 400px; width: 90%; }
    .modal-content.win { background: linear-gradient(135deg, #4caf50, #8bc34a); color: white; }
    .modal-content.lose { background: linear-gradient(135deg, #f44336, #e91e63); color: white; }
    .modal-answer { font-size: 2em; font-weight: bold; margin: 20px 0; font-family: monospace; letter-spacing: 5px; }
    .modal-btn { padding: 12px 30px; background: white; color: #333; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }

    .error-toast { display: none; background: #f44336; color: white; text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <div class="status-bar">
      <div id="connStatus" class="connection-status">接続中...</div>
      <div id="serverStatus" class="server-status">👥 サーバー人数: 0</div>
    </div>
    
    <h1>🎮 Hit & Blow</h1>
    <div id="errorToast" class="error-toast"></div>

    <!-- ======== ホーム画面 ======== -->
    <div id="homeScreen" class="screen active">
      <div class="action-panel">
        <h3>🏠 部屋を作る</h3>
        <div class="form-group">
          <label>モード</label>
          <select id="createMode">
            <option value="digits">🔢 数字モード (0-9)</option>
            <option value="letters">🔤 英字モード (A-Z)</option>
          </select>
        </div>
        <div class="form-group">
          <label>桁数</label>
          <select id="createDigits">
            <option value="3">3桁</option>
            <option value="4">4桁</option>
            <option value="5">5桁</option>
          </select>
        </div>
        <button class="btn btn-create" id="btnCreateRoom" disabled>部屋を作成</button>
      </div>

      <div class="action-panel">
        <h3>🚪 部屋に参加する</h3>
        <div class="form-group">
          <label>部屋ID</label>
          <input type="text" id="joinRoomId" placeholder="4桁の数字を入力" maxlength="4">
        </div>
        <button class="btn btn-join" id="btnJoinRoom" disabled>参加する</button>
      </div>
    </div>

    <!-- ======== 待機部屋画面 ======== -->
    <div id="roomScreen" class="screen">
      <div class="room-info">
        <p>部屋IDを友達に教えて対戦しよう！</p>
        <div class="room-id-display" id="displayRoomId">----</div>
        <p>あなたは Player <span id="myPlayerId"></span> です</p>
      </div>
      
      <div class="player-list">
        <div class="player-card" id="cardPlayer0">Player 1<br><span id="statusPlayer0">待機中...</span></div>
        <div class="player-card" id="cardPlayer1">Player 2<br><span id="statusPlayer1">待機中...</span></div>
      </div>

      <button class="btn btn-ready" id="btnReady">準備OK</button>
    </div>

    <!-- ======== ゲーム画面 ======== -->
    <div id="gameScreen" class="screen">
      <div class="game-header">
        <div class="player-info" id="infoPlayer0">
          <div>🎮 Player 1</div>
          <div class="life-gauge" id="lifePlayer0"></div>
        </div>
        <div class="turns-display" id="turnsDisplay"></div>
        <div class="player-info" id="infoPlayer1">
          <div>🎮 Player 2</div>
          <div class="life-gauge" id="lifePlayer1"></div>
        </div>
      </div>

      <div class="history-section" id="historyLog"></div>

      <div class="input-boxes" id="inputBoxes"></div>
      <div class="button-pad" id="buttonPad"></div>

      <div class="control-buttons">
        <button class="control-btn btn-back" id="btnBack">← Back</button>
        <button class="control-btn btn-clear" id="btnClear">Clear</button>
        <button class="control-btn btn-enter" id="btnEnter">Enter ✓</button>
      </div>
    </div>
  </div>

  <div class="modal" id="resultModal">
    <div class="modal-content" id="modalContent">
      <h2 id="modalTitle"></h2>
      <p id="modalInfo"></p>
      <div class="modal-answer" id="modalAnswer"></div>
      <button class="modal-btn" id="btnModalClose">タイトルへ戻る</button>
    </div>
  </div>

  <script>
    const state = {
      ws: null,
      roomId: null,
      myIdx: -1,
      mode: 'digits',
      digits: 3,
      maxTurns: 15,
      currentInput: [],
      history: [],
      playerTries: [0, 0],
      isMyTurn: false,
      isReady: false
    };

    function showError(msg) {
      const el = document.getElementById('errorToast');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

    function switchScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    }

    // Connect WS
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}/ws`;
    state.ws = new WebSocket(wsUrl);

    state.ws.onopen = () => {
      document.getElementById('connStatus').textContent = '✓ 接続済み';
      document.getElementById('connStatus').classList.add('connected');
      document.getElementById('btnCreateRoom').disabled = false;
      document.getElementById('btnJoinRoom').disabled = false;
    };
    state.ws.onclose = () => {
      document.getElementById('connStatus').textContent = '接続切れ';
      document.getElementById('connStatus').classList.remove('connected');
    };

    state.ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      console.log("WS Recv:", data);

      if (data.type === 'server_status') {
        document.getElementById('serverStatus').textContent = `👥 サーバー人数: ${data.count}`;
      }
      else if (data.type === 'room_created') {
        state.roomId = data.room_id;
      }
      else if (data.type === 'room_joined') {
        state.roomId = data.room_id;
        state.myIdx = data.player_id;
        document.getElementById('displayRoomId').textContent = state.roomId;
        document.getElementById('myPlayerId').textContent = (state.myIdx + 1);
        switchScreen('roomScreen');
        updateRoomStatus();
      }
      else if (data.type === 'room_error') {
        showError(data.message);
        if (data.message.includes("Room closed")) {
          switchScreen('homeScreen');
          state.roomId = null;
          state.isReady = false;
          document.getElementById('btnReady').classList.remove('is-ready');
          document.getElementById('btnReady').textContent = '準備OK';
          document.getElementById('btnReady').disabled = false;
        }
      }
      else if (data.type === 'player_ready') {
        const pId = data.player_id;
        const card = document.getElementById(`cardPlayer${pId}`);
        card.classList.add('ready');
        document.getElementById(`statusPlayer${pId}`).textContent = '準備完了！';
      }
      else if (data.type === 'game_start') {
        state.mode = data.mode;
        state.digits = data.digits;
        state.maxTurns = data.max_turns;
        state.currentInput = [];
        state.history = [];
        state.playerTries = [0, 0];
        initGameUI();
        switchScreen('gameScreen');
      }
      else if (data.type === 'your_turn') {
        const turnPlayer = data.player;
        const turnCount = data.turn;
        state.isMyTurn = (turnPlayer === state.myIdx);
        updateGameHeader(turnPlayer, turnCount);
        updateInputUI();
      }
      else if (data.type === 'result') {
        state.history.push(data);
        state.playerTries[data.player] += 1;
        updateHistory();
        updateGameHeader(data.player, 0); // just to update hearts
      }
      else if (data.type === 'win') {
        showModal('win', data);
      }
      else if (data.type === 'game_over') {
        showModal('lose', data);
      }
    };

    // Home Actions
    document.getElementById('btnCreateRoom').onclick = () => {
      const mode = document.getElementById('createMode').value;
      const digits = parseInt(document.getElementById('createDigits').value);
      state.ws.send(JSON.stringify({ type: 'create_room', mode, digits }));
    };
    document.getElementById('btnJoinRoom').onclick = () => {
      const rid = document.getElementById('joinRoomId').value.trim();
      if (rid) state.ws.send(JSON.stringify({ type: 'join_room', room_id: rid }));
    };

    // Room Actions
    function updateRoomStatus() {
      document.getElementById('cardPlayer0').classList.remove('ready');
      document.getElementById('statusPlayer0').textContent = '待機中...';
      document.getElementById('cardPlayer1').classList.remove('ready');
      if (state.myIdx === 0) {
        document.getElementById('statusPlayer1').textContent = '対戦相手を待っています...';
      } else {
        document.getElementById('statusPlayer1').textContent = '待機中...';
      }
    }
    document.getElementById('btnReady').onclick = () => {
      if (!state.isReady) {
        state.isReady = true;
        document.getElementById('btnReady').classList.add('is-ready');
        document.getElementById('btnReady').textContent = '準備完了';
        document.getElementById('btnReady').disabled = true;
        state.ws.send(JSON.stringify({ type: 'ready' }));
      }
    };

    // Game UI
    function initGameUI() {
      const boxes = document.getElementById('inputBoxes');
      boxes.innerHTML = '';
      for (let i = 0; i < state.digits; i++) {
        const d = document.createElement('div');
        d.className = 'input-box';
        boxes.appendChild(d);
      }
      
      const pad = document.getElementById('buttonPad');
      pad.innerHTML = '';
      const chars = state.mode === 'letters' ? 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('') : '0123456789'.split('');
      chars.forEach(c => {
        const b = document.createElement('button');
        b.className = 'num-btn'; b.textContent = c; b.dataset.char = c;
        b.onclick = () => {
          if (state.currentInput.length < state.digits) {
            state.currentInput.push(c);
            updateInputUI();
          }
        };
        pad.appendChild(b);
      });
      document.getElementById('historyLog').innerHTML = '';
      updateInputUI();
    }

    function updateInputUI() {
      const boxes = document.querySelectorAll('.input-box');
      boxes.forEach((box, i) => {
        box.textContent = state.currentInput[i] || '';
        box.className = 'input-box';
        if (i < state.currentInput.length) box.classList.add('filled');
        if (i === state.currentInput.length) box.classList.add('active');
      });

      document.querySelectorAll('.num-btn').forEach(b => {
        b.disabled = state.currentInput.includes(b.dataset.char);
      });

      const len = state.currentInput.length;
      document.getElementById('btnBack').disabled = len === 0;
      document.getElementById('btnClear').disabled = len === 0;
      document.getElementById('btnEnter').disabled = (len !== state.digits || !state.isMyTurn);
    }

    document.getElementById('btnBack').onclick = () => { state.currentInput.pop(); updateInputUI(); };
    document.getElementById('btnClear').onclick = () => { state.currentInput = []; updateInputUI(); };
    document.getElementById('btnEnter').onclick = () => {
      if (state.currentInput.length === state.digits && state.isMyTurn) {
        state.ws.send(JSON.stringify({ type: 'guess', value: state.currentInput.join('') }));
        state.currentInput = [];
        state.isMyTurn = false;
        updateInputUI();
      }
    };

    function updateGameHeader(turnPlayer, turnCount) {
      if (turnCount > 0) {
        const rem = state.maxTurns - turnCount;
        document.getElementById('turnsDisplay').innerHTML = `<div>ターン: ${turnCount} / ${state.maxTurns}</div><div style="color:#f44336;">残り: ${rem > 0 ? rem : 0}</div>`;
      }
      
      [0, 1].forEach(pId => {
        const info = document.getElementById(`infoPlayer${pId}`);
        if (pId === turnPlayer && turnCount > 0) info.classList.add('active');
        else if (turnCount > 0) info.classList.remove('active');
        
        const lifeDiv = document.getElementById(`lifePlayer${pId}`);
        lifeDiv.innerHTML = '';
        const remLife = state.maxTurns - state.playerTries[pId];
        for(let i=0; i<Math.min(10, state.maxTurns); i++) {
          const h = document.createElement('div');
          h.className = 'life-heart' + (i < remLife ? '' : ' empty');
          lifeDiv.appendChild(h);
        }
      });
    }

    function updateHistory() {
      const log = document.getElementById('historyLog');
      log.innerHTML = '';
      state.history.forEach(h => {
        const div = document.createElement('div');
        div.className = `history-item player${h.player}`;
        const pName = h.player === state.myIdx ? "あなた" : `Player ${h.player+1}`;
        div.innerHTML = `
          <strong>${pName}</strong><br>
          <div class="guess-value">${h.guess}</div>
          <span class="badge badge-hit">Hit: ${h.hit}</span>
          <span class="badge badge-blow">Blow: ${h.blow}</span>
        `;
        log.appendChild(div);
      });
      log.scrollTop = log.scrollHeight;
    }

    function showModal(type, data) {
      const content = document.getElementById('modalContent');
      content.className = `modal-content ${type}`;
      if (type === 'win') {
        const pName = data.winner === state.myIdx ? "あなた" : `Player ${data.winner+1}`;
        document.getElementById('modalTitle').textContent = '🎉 決着！';
        document.getElementById('modalInfo').innerHTML = `<strong>${pName}</strong> が <strong>${data.tries}</strong> 回で正解しました！`;
        document.getElementById('modalAnswer').textContent = data.answer;
      } else {
        document.getElementById('modalTitle').textContent = '💔 ゲームオーバー';
        document.getElementById('modalInfo').textContent = '最大ターンに達しました。';
        document.getElementById('modalAnswer').textContent = '';
      }
      document.getElementById('resultModal').classList.add('active');
    }

    document.getElementById('btnModalClose').onclick = () => {
      document.getElementById('resultModal').classList.remove('active');
      window.location.reload(); // Reset fully
    };
  </script>
</body>
</html>
