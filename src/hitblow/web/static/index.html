<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hit & Blow - 通信対戦</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 2em;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ======== モード選択画面 ======== */
    #modeScreen {
      display: block;
    }

    .mode-selection {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .mode-option {
      flex: 1;
      padding: 20px;
      border: 2px solid #ddd;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .mode-option:hover {
      border-color: #667eea;
      transform: translateY(-5px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
    }

    .mode-option.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border-color: #667eea;
    }

    .mode-option h3 {
      margin-bottom: 10px;
      font-size: 1.3em;
    }

    .mode-option p {
      font-size: 0.9em;
      opacity: 0.8;
    }

    .difficulty-select {
      margin-bottom: 20px;
    }

    .difficulty-select label {
      display: block;
      margin-bottom: 10px;
      font-weight: bold;
      color: #333;
    }

    .difficulty-select select {
      width: 100%;
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
    }

    .start-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 20px;
    }

    .start-btn:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
    }

    .start-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ======== ゲーム画面 ======== */
    #gameScreen {
      display: none;
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #eee;
    }

    .player-info {
      flex: 1;
      text-align: center;
    }

    .player-info.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 10px;
      border-radius: 8px;
      font-weight: bold;
    }

    .turns-display {
      flex: 1;
      text-align: center;
      font-size: 0.9em;
      color: #666;
    }

    .life-gauge {
      display: flex;
      gap: 5px;
      margin-top: 10px;
      justify-content: center;
    }

    .life-heart {
      width: 20px;
      height: 20px;
      background: #ff6b6b;
      border-radius: 50%;
      transition: all 0.3s;
    }

    .life-heart.empty {
      background: #ddd;
    }

    /* ======== 入力UI ======== */
    .input-section {
      margin: 30px 0;
    }

    .input-boxes {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .input-box {
      width: 60px;
      height: 60px;
      border: 3px solid #ddd;
      border-radius: 10px;
      font-size: 1.5em;
      font-weight: bold;
      text-align: center;
      line-height: 60px;
      background: #f9f9f9;
      transition: all 0.3s;
    }

    .input-box.active {
      border-color: #667eea;
      background: #f0f4ff;
      box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
    }

    .input-box.filled {
      border-color: #667eea;
      color: #667eea;
    }

    /* ======== ボタンパッド ======== */
    .button-pad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }

    .num-btn {
      padding: 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
      background: white;
      font-weight: bold;
      font-size: 1.1em;
      cursor: pointer;
      transition: all 0.3s;
    }

    .num-btn:hover:not(:disabled) {
      background: #667eea;
      color: white;
      border-color: #667eea;
      transform: translateY(-3px);
    }

    .num-btn:disabled {
      background: #e0e0e0;
      color: #999;
      cursor: not-allowed;
      opacity: 0.5;
    }

    .control-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .control-btn {
      padding: 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
      background: white;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }

    .control-btn.back {
      background: #ff9800;
      color: white;
      border-color: #ff9800;
    }

    .control-btn.back:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(255, 152, 0, 0.3);
    }

    .control-btn.clear {
      background: #f44336;
      color: white;
      border-color: #f44336;
    }

    .control-btn.clear:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(244, 67, 54, 0.3);
    }

    .control-btn.enter {
      background: #4caf50;
      color: white;
      border-color: #4caf50;
      font-size: 1.1em;
    }

    .control-btn.enter:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
    }

    .control-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ======== ターンログ ======== */
    .history-section {
      background: #f5f5f5;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
      max-height: 250px;
      overflow-y: auto;
    }

    .history-title {
      font-weight: bold;
      margin-bottom: 10px;
      color: #333;
    }

    .history-item {
      background: white;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 6px;
      font-size: 0.95em;
      border-left: 4px solid #ddd;
    }

    .history-item.player1 {
      border-left-color: #2196f3;
    }

    .history-item.player2 {
      border-left-color: #ff6f00;
    }

    .guess-value {
      font-weight: bold;
      font-family: monospace;
      margin: 5px 0;
    }

    .result-badges {
      display: flex;
      gap: 10px;
      margin-top: 5px;
    }

    .badge {
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 0.85em;
      font-weight: bold;
    }

    .badge-hit {
      background: linear-gradient(135deg, #4caf50, #8bc34a);
      color: white;
    }

    .badge-blow {
      background: linear-gradient(135deg, #ffc107, #ff9800);
      color: white;
    }

    /* ======== ゲーム終了演出 ======== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.3s;
    }

    .modal.active {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: white;
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      animation: slideUp 0.5s;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-content.win {
      background: linear-gradient(135deg, #4caf50, #8bc34a);
      color: white;
    }

    .modal-content.lose {
      background: linear-gradient(135deg, #f44336, #e91e63);
      color: white;
    }

    .modal-title {
      font-size: 2.5em;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .modal-info {
      font-size: 1.1em;
      margin-bottom: 30px;
      line-height: 1.8;
    }

    .modal-answer {
      font-size: 2em;
      font-weight: bold;
      margin: 20px 0;
      font-family: monospace;
      letter-spacing: 5px;
    }

    .modal-btn {
      padding: 12px 30px;
      background: white;
      color: #333;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1em;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 20px;
    }

    .modal-btn:hover {
      transform: scale(1.05);
    }

    /* ======== 接続状態 ======== */
    .connection-status {
      text-align: center;
      padding: 15px;
      background: #fff3cd;
      border-radius: 8px;
      margin-bottom: 20px;
      color: #856404;
      font-weight: bold;
    }

    .connection-status.connected {
      background: #d4edda;
      color: #155724;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ======== レスポンシブ ======== */
    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }

      h1 {
        font-size: 1.5em;
        margin-bottom: 20px;
      }

      .input-boxes {
        gap: 5px;
      }

      .input-box {
        width: 50px;
        height: 50px;
        font-size: 1.2em;
        line-height: 50px;
      }

      .button-pad {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- ======== モード選択画面 ======== -->
    <div id="modeScreen">
      <h1>🎮 Hit & Blow</h1>
      
      <div class="connection-status" id="connectionStatus">
        <span class="spinner"></span> サーバーに接続中...
      </div>

      <h2 style="text-align: center; margin: 20px 0; font-size: 1.2em; color: #333;">
        ゲームモードを選択してください
      </h2>

      <div class="mode-selection" id="modeSelection">
        <div class="mode-option active" data-mode="digits">
          <h3>🔢 数字モード</h3>
          <p>0～9の数字を当てよう</p>
        </div>
        <div class="mode-option" data-mode="letters">
          <h3>🔤 英字モード</h3>
          <p>A～Zのアルファベットを当てよう</p>
        </div>
      </div>

      <div class="difficulty-select">
        <label for="difficultySel">難易度（桁数）を選択：</label>
        <select id="difficultySel">
          <option value="3">普通 (3桁)</option>
          <option value="4">難しい (4桁)</option>
          <option value="5">超難しい (5桁)</option>
        </select>
      </div>

      <button class="start-btn" id="startBtn" disabled>🎮 ゲーム開始</button>
      
      <p style="text-align: center; margin-top: 20px; color: #999; font-size: 0.9em;">
        ※ 2人が接続してからゲームが開始します
      </p>
    </div>

    <!-- ======== ゲーム画面 ======== -->
    <div id="gameScreen" style="display: none;">
      <div class="game-header">
        <div class="player-info" id="player1Info">
          <div>🎮 Player 1</div>
          <div class="life-gauge" id="life1"></div>
        </div>
        <div class="turns-display" id="turnsDisplay"></div>
        <div class="player-info" id="player2Info">
          <div>🎮 Player 2</div>
          <div class="life-gauge" id="life2"></div>
        </div>
      </div>

      <div class="history-section">
        <div class="history-title">📋 ターンログ</div>
        <div id="historyLog"></div>
      </div>

      <div class="input-section">
        <div class="input-boxes" id="inputBoxes"></div>

        <div class="button-pad" id="buttonPad"></div>

        <div class="control-buttons">
          <button class="control-btn back" id="backBtn" disabled>← Back</button>
          <button class="control-btn clear" id="clearBtn" disabled>Clear</button>
          <button class="control-btn enter" id="enterBtn" disabled>Enter ✓</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ======== モーダル（ゲーム終了） ======== -->
  <div class="modal" id="resultModal">
    <div class="modal-content" id="modalContent">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-info" id="modalInfo"></div>
      <div class="modal-answer" id="modalAnswer"></div>
      <button class="modal-btn" id="modalBtn">新しいゲーム</button>
    </div>
  </div>

  <script>
    // ======== グローバル状態 ========
    const state = {
      ws: null,
      currentInput: [],
      currentPlayer: -1,
      maxTurns: 15,
      turnCount: 0,
      mode: 'digits',
      digits: 3,
      selectedMode: 'digits',
      selectedDigits: 3,
      history: [],
      playerTries: [0, 0],
      isMyTurn: false,
      gameActive: false
    };

    // ======== WebSocket接続 ========
    function connectWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const url = `${protocol}//${window.location.host}/ws`;
      
      state.ws = new WebSocket(url);
      
      state.ws.onopen = () => {
        console.log('Connected to server');
        updateConnectionStatus(true);
        document.getElementById('startBtn').disabled = false;
      };
      
      state.ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        handleMessage(data);
      };
      
      state.ws.onclose = () => {
        console.log('Disconnected from server');
        updateConnectionStatus(false);
        document.getElementById('startBtn').disabled = true;
      };
      
      state.ws.onerror = (error) => {
        console.error('WebSocket error:', error);
        updateConnectionStatus(false);
      };
    }

    function updateConnectionStatus(connected) {
      const status = document.getElementById('connectionStatus');
      if (connected) {
        status.textContent = '✓ サーバーに接続しました';
        status.classList.add('connected');
      } else {
        status.innerHTML = '<span class="spinner"></span> サーバーに接続中...';
        status.classList.remove('connected');
      }
    }

    // ======== メッセージハンドラ ========
    function handleMessage(data) {
      const { type } = data;

      if (type === 'game_start') {
        startGame(data);
      } else if (type === 'your_turn') {
        showYourTurn(data);
      } else if (type === 'result') {
        showResult(data);
      } else if (type === 'win') {
        showWin(data);
      } else if (type === 'game_over') {
        showGameOver(data);
      }
    }

    // ======== ゲーム開始 ========
    function startGame(data) {
      state.mode = data.mode;
      state.digits = data.digits;
      state.maxTurns = data.max_turns;
      state.currentInput = [];
      state.history = [];
      state.playerTries = [0, 0];
      state.turnCount = 0;
      state.gameActive = true;

      document.getElementById('modeScreen').style.display = 'none';
      document.getElementById('gameScreen').style.display = 'block';

      initializeInputUI();
      updateLifeGauges();
      updateTurnsDisplay();
    }

    // ======== UI初期化 ========
    function initializeInputUI() {
      const inputBoxes = document.getElementById('inputBoxes');
      inputBoxes.innerHTML = '';
      for (let i = 0; i < state.digits; i++) {
        const box = document.createElement('div');
        box.className = 'input-box';
        inputBoxes.appendChild(box);
      }

      const buttonPad = document.getElementById('buttonPad');
      buttonPad.innerHTML = '';

      const chars = state.mode === 'letters' 
        ? 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('')
        : '0123456789'.split('');

      chars.forEach(char => {
        const btn = document.createElement('button');
        btn.className = 'num-btn';
        btn.textContent = char;
        btn.onclick = () => selectChar(char, btn);
        btn.dataset.char = char;
        buttonPad.appendChild(btn);
      });

      updateInputUI();
    }

    function updateInputUI() {
      const boxes = document.querySelectorAll('.input-box');
      boxes.forEach((box, idx) => {
        box.textContent = state.currentInput[idx] || '';
        box.classList.remove('active', 'filled');
        if (idx < state.currentInput.length) {
          box.classList.add('filled');
        }
        if (idx === state.currentInput.length) {
          box.classList.add('active');
        }
      });

      const numBtns = document.querySelectorAll('.num-btn');
      numBtns.forEach(btn => {
        const char = btn.dataset.char;
        btn.disabled = state.currentInput.includes(char);
      });

      const backBtn = document.getElementById('backBtn');
      const clearBtn = document.getElementById('clearBtn');
      const enterBtn = document.getElementById('enterBtn');
      
      backBtn.disabled = state.currentInput.length === 0;
      clearBtn.disabled = state.currentInput.length === 0;
      enterBtn.disabled = state.currentInput.length !== state.digits || !state.isMyTurn;
    }

    function selectChar(char, btn) {
      if (state.currentInput.length < state.digits) {
        state.currentInput.push(char);
        updateInputUI();
      }
    }

    // ======== コントロールボタン ========
    document.getElementById('backBtn').addEventListener('click', () => {
      state.currentInput.pop();
      updateInputUI();
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      state.currentInput = [];
      updateInputUI();
    });

    document.getElementById('enterBtn').addEventListener('click', () => {
      if (state.currentInput.length === state.digits && state.isMyTurn) {
        const guess = state.currentInput.join('');
        state.ws.send(JSON.stringify({
          type: 'guess',
          value: guess
        }));
        
        state.currentInput = [];
        state.isMyTurn = false;
        updateInputUI();
      }
    });

    // ======== ゲーム進行 ========
    function showYourTurn(data) {
      state.currentPlayer = data.player;
      state.turnCount = data.turn;
      state.isMyTurn = true;
      updateTurnsDisplay();
      updatePlayerHighlight();
      updateInputUI();
    }

    function showResult(data) {
      const { player, guess, hit, blow } = data;
      
      state.history.push({ player, guess, hit, blow });
      state.playerTries[player] += 1;

      updateHistoryDisplay();
      updateLifeGauges();
      updateInputUI();
    }

    function showWin(data) {
      const { winner, answer, tries } = data;
      const winnerName = winner === 0 ? 'Player 1' : 'Player 2';
      
      state.gameActive = false;
      
      const modal = document.getElementById('resultModal');
      const content = document.getElementById('modalContent');
      content.classList.remove('lose');
      content.classList.add('win');
      
      document.getElementById('modalTitle').textContent = '🎉 勝利！';
      document.getElementById('modalInfo').innerHTML = `
        <strong>${winnerName}</strong> の勝利です！<br>
        <strong>${tries}</strong> 回で正解しました！
      `;
      document.getElementById('modalAnswer').textContent = answer;
      
      modal.classList.add('active');
    }

    function showGameOver(data) {
      state.gameActive = false;
      
      const modal = document.getElementById('resultModal');
      const content = document.getElementById('modalContent');
      content.classList.remove('win');
      content.classList.add('lose');
      
      document.getElementById('modalTitle').textContent = '💔 ゲームオーバー';
      document.getElementById('modalInfo').textContent = '最大ターン数に達しました。次のゲームに挑戦してください！';
      document.getElementById('modalAnswer').textContent = '';
      
      modal.classList.add('active');
    }

    // ======== UI更新 ========
    function updateHistoryDisplay() {
      const historyLog = document.getElementById('historyLog');
      historyLog.innerHTML = '';
      
      state.history.forEach(item => {
        const div = document.createElement('div');
        div.className = `history-item ${item.player === 0 ? 'player1' : 'player2'}`;
        const playerName = item.player === 0 ? 'Player 1' : 'Player 2';
        const hitBadge = `<span class="badge badge-hit">Hit: ${item.hit}</span>`;
        const blowBadge = `<span class="badge badge-blow">Blow: ${item.blow}</span>`;
        
        div.innerHTML = `
          <strong>${playerName}</strong><br>
          <div class="guess-value">${item.guess}</div>
          <div class="result-badges">${hitBadge}${blowBadge}</div>
        `;
        historyLog.appendChild(div);
      });
      
      // 最新のログまでスクロール
      historyLog.scrollTop = historyLog.scrollHeight;
    }

    function updateTurnsDisplay() {
      const remaining = state.maxTurns - state.turnCount;
      document.getElementById('turnsDisplay').innerHTML = `
        <div>ターン: ${state.turnCount} / ${state.maxTurns}</div>
        <div style="font-size: 0.8em; color: #f44336;">残り: ${Math.max(0, remaining)}</div>
      `;
    }

    function updateLifeGauges() {
      for (let player = 0; player < 2; player++) {
        const lifeDiv = document.getElementById(`life${player + 1}`);
        lifeDiv.innerHTML = '';
        const remaining = state.maxTurns - state.playerTries[player];
        const maxHearts = Math.min(state.maxTurns, 10);
        
        for (let i = 0; i < maxHearts; i++) {
          const heart = document.createElement('div');
          heart.className = 'life-heart' + (i < Math.max(0, remaining) ? '' : ' empty');
          lifeDiv.appendChild(heart);
        }
      }
    }

    function updatePlayerHighlight() {
      const player1 = document.getElementById('player1Info');
      const player2 = document.getElementById('player2Info');
      
      if (state.currentPlayer === 0) {
        player1.classList.add('active');
        player2.classList.remove('active');
      } else {
        player1.classList.remove('active');
        player2.classList.add('active');
      }
    }

    // ======== モード選択 ========
    document.querySelectorAll('.mode-option').forEach(option => {
      option.addEventListener('click', () => {
        document.querySelectorAll('.mode-option').forEach(opt => opt.classList.remove('active'));
        option.classList.add('active');
        state.selectedMode = option.dataset.mode;
      });
    });

    document.getElementById('difficultySel').addEventListener('change', (e) => {
      state.selectedDigits = parseInt(e.target.value);
    });

    document.getElementById('startBtn').addEventListener('click', () => {
      state.ws.send(JSON.stringify({
        type: 'game_config',
        mode: state.selectedMode,
        digits: state.selectedDigits,
        max_turns: 15
      }));
    });

    // ======== モーダル閉じる ========
    document.getElementById('modalBtn').addEventListener('click', () => {
      document.getElementById('resultModal').classList.remove('active');
      document.getElementById('gameScreen').style.display = 'none';
      document.getElementById('modeScreen').style.display = 'block';
      state.history = [];
      state.playerTries = [0, 0];
    });

    // ======== 初期化 ========
    document.addEventListener('DOMContentLoaded', () => {
      connectWebSocket();
    });
  </script>
</body>
</html>
