<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hit & Blow</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    #log { white-space: pre-wrap; border: 1px solid #ccc; padding: 10px; height: 200px; overflow-y: scroll; }
  </style>
</head>
<body>
  <h1>Hit & Blow 通信対戦</h1>

  <label>数字を入力：</label>
  <input id="guess" placeholder="例: 1234">
  <button onclick="sendGuess()">送信</button>

  <h2>ログ</h2>
  <div id="log"></div>

  <script>
    const ws = new WebSocket("wss://p-hitblow.onrender.com");

    ws.onmessage = (event) => {
      document.getElementById("log").textContent += event.data + "\n";
    };

    function sendGuess() {
      const g = document.getElementById("guess").value;
      ws.send(g);
    }
  </script>
</body>
</html>
